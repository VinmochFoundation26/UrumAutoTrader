# Nginx config for AutoTrader SPA — served by the frontend container
# Nginx reverse-proxies /api/* → backend container on port 5050
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Proxy /api → backend (docker-compose service name: backend)
    location /api/ {
        proxy_pass         http://backend:5050/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection '';
        proxy_set_header   Host $host;
        proxy_cache_bypass $http_upgrade;
        # SSE support (keep-alive streaming)
        proxy_buffering    off;
        proxy_read_timeout 3600s;
    }

    # Admin dashboard — serve admin.html for /admin/*
    location /admin {
        try_files $uri $uri/ /admin.html;
    }

    # SPA fallback — all routes return index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
