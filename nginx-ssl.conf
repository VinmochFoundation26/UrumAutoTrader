# ── SSL Reverse Proxy — runs on host, terminates HTTPS → frontend:80 ─────────
# Prerequisites:
#   sudo certbot certonly --standalone -d urumtrader.com
#   Then uncomment nginx-ssl in docker-compose.yml

server {
    listen 80;
    server_name urumtrader.com www.urumtrader.com;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name urumtrader.com www.urumtrader.com;

    ssl_certificate     /etc/letsencrypt/live/urumtrader.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/urumtrader.com/privkey.pem;

    # Modern SSL settings
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Deploy webhook — proxies to host deploy-hook service
    location /deploy-hook {
        proxy_pass         http://host.docker.internal:5051;
        client_max_body_size 100M;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # Forward all traffic to the frontend container
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection '';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        # SSE streaming
        proxy_buffering    off;
        proxy_read_timeout 3600s;
    }
}
