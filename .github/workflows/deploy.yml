name: Deploy Backend to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Build TypeScript
        working-directory: backend
        run: npm run build

      - name: Package dist + package files
        run: tar -czf /tmp/backend-dist.tar.gz -C backend dist/ package.json package-lock.json

      - name: Deploy via webhook
        run: |
          STATUS=$(curl -s -o /tmp/deploy-response.txt -w "%{http_code}" \
            -X POST \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @/tmp/backend-dist.tar.gz \
            --max-time 120 \
            https://urumtrader.com/deploy-hook)
          echo "Response: $(cat /tmp/deploy-response.txt)"
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Deploy failed!"
            exit 1
          fi
          echo "Deploy successful!"
