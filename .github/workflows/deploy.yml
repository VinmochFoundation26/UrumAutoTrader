name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger deploy on VPS
        run: |
          STATUS=$(curl -s -o /tmp/deploy-response.txt -w "%{http_code}" \
            -X POST \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_TOKEN }}" \
            --max-time 180 \
            https://urumtrader.com/deploy-hook)
          echo "Response: $(cat /tmp/deploy-response.txt)"
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "Deploy failed!"
            exit 1
          fi
          echo "Deploy successful!"

